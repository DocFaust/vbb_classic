<ui:composition template="../template.xhtml" xmlns="http://www.w3.org/1999/xhtml" xmlns:f="http://java.sun.com/jsf/core" xmlns:p="http://primefaces.org/ui"
	xmlns:ui="http://xmlns.jcp.org/jsf/facelets" xmlns:h="http://java.sun.com/jsf/html">
	<f:loadBundle basename="de.docfaust.vbb.messages_de_DE" var="msg" />
	<ui:define name="content">
		<h:form id="form">
			<p:panel id="pnl" header="Profil bearbeiten">
				<p:growl id="growl" showDetail="true" />
					<p:panelGrid columns="2" columnClasses="label,value">

						<p:outputLabel for="name" value="Name:" />
						<p:inputText id="name" value="#{editProfileBean.user.username}" placeholder="Name" />

						<p:outputLabel value="UserID" for="userid" />
						<p:inputText value="#{editProfileBean.user.userid}" placeholder="UserID" id="userid" required="true" requiredMessage="#{msg['valuerequired']}" />

						<p:outputLabel value="Email" for="email" />
						<p:inputText value="#{editProfileBean.user.email}" placeholder="Email" id="email" validatorMessage="Keine gültige Emailadresse" required="true"
							requiredMessage="#{msg['valuerequired']}">
							<f:validateRegex pattern="^[_A-Za-z0-9-\+]+(\.[_A-Za-z0-9-]+)*@[A-Za-z0-9-]+(\.[A-Za-z0-9]+)*(\.[A-Za-z]{2,})$" />
						</p:inputText>
					</p:panelGrid>
					<p/>
					<p:commandButton value="Speichern" actionListener="#{editProfileBean.save}" update=":form:pnl,:form:growl" />
			</p:panel>
		</h:form>
		<h:form id="pwdform">
			<p:panel id="pnl" header="Passwort ändern">
				<p:panelGrid columns="3" columnClasses="label,value">
					<p:outputLabel value="#{msg['register.password'] }" for="password" />
					<p:password value="#{editProfileBean.password }" placeholder="Passwort" id="password" required="true" requiredMessage="#{msg['valuerequired']}" binding="#{password}">
						<f:validator validatorId="passwordRepetitionValidator" />
						<f:attribute name="confirm" value="#{confirmPassword.submittedValue}" />
					</p:password>
					<p:message for="password" id="m_password" />

					<p:outputLabel value="#{msg['register.passwordrepeat'] }" for="confirm" />
					<p:password id="confirm" placeholder="Passwort" required="true" requiredMessage="#{msg['valuerequired']}" binding="#{confirmPassword}" />
					<p:message for="confirm" id="m_confirm" />
				</p:panelGrid>
					<p/>
				<p:commandButton value="Passwort ändern" actionListener="#{editProfileBean.editPassword}" update=":form:pnl,:form:growl" onclick="ruleDialog.hide()" />
			</p:panel>
		</h:form>
	</ui:define>
</ui:composition>
