<ui:composition template="../template.xhtml" xmlns="http://www.w3.org/1999/xhtml" xmlns:f="http://java.sun.com/jsf/core" xmlns:p="http://primefaces.org/ui"
	xmlns:ui="http://xmlns.jcp.org/jsf/facelets" xmlns:h="http://java.sun.com/jsf/html">
	<f:loadBundle basename="de.docfaust.vbb.messages_de_DE" var="msg" />
	<ui:define name="content">
		<h:form id="frm">
			<p:growl id="growl" showDetail="true" />
			<p:panel id="pnl" header="Spiel eingeben">
				<h:panelGrid border="0" columns="2">
					<h:panelGrid border="0" columns="3" cellpadding="5">
						<p:outputLabel for="datum" value="#{msg['spiel.date'] }" />
						<p:calendar id="datum" value="#{spielBean.datum }" required="true" requiredMessage="Datum erforderlich" locale="de" placeholder="Datum"/>
						<p:message for="datum" />
					</h:panelGrid>
				</h:panelGrid>
				<p:dataTable id="spieler" value="#{spielBean.spielerList }" var="s" scrollable="true">
					<p:column id="name" headerText="#{msg['spiel.name'] }" width="15%">
						<p:outputLabel value="#{s.name }"/>
					</p:column>
					<p:column id="anwesend" headerText="#{msg['spiel.there'] }" width="30">
						<h:selectBooleanCheckbox value="#{s.anwesend }"/>
					</p:column>
					<p:column id="bezahlt" headerText="#{msg['spiel.payed'] }" width="30">
						<h:selectBooleanCheckbox value="#{s.bezahlt }"/>
					</p:column>
				</p:dataTable>
				<br/>
				<p:commandButton value="Speichern" action="#{spielBean.saveSpiel}" update="growl,pnl,frm"/>
			</p:panel>
		</h:form>
	</ui:define>
</ui:composition>
