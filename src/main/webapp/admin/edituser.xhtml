<ui:composition template="../template.xhtml"
	xmlns="http://www.w3.org/1999/xhtml"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:p="http://primefaces.org/ui"
	xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
	xmlns:h="http://java.sun.com/jsf/html">
	<f:loadBundle basename="de.docfaust.vbb.messages_de_DE" var="msg" />
	<ui:define name="content">
		<h:form id="edituserform">

			<p:panel id="pnl" header="User bearbeiten">
				<p:growl id="growl" showDetail="true" />

				<p:contextMenu for="tab">
					<p:menuitem value="Neu" update="growl,:dlg:userPan"
						icon="ui-icon-plus" actionListener="#{editUserBean.addUser}"
						oncomplete="PF('userDialog').show()" />
					<p:menuitem value="Bearbeiten" update="growl,:dlg:userPan"
						icon="ui-icon-pencil" oncomplete="PF('userDialog').show()" />
					<p:menuitem value="Löschen" update="growl,tab" icon="ui-icon-close"
						actionListener="#{editUserBean.delete}" />
				</p:contextMenu>
 				<p:dataTable id="tab" value="#{editUserBean.users}" var="user"
					scrollable="true"
					selection="#{editUserBean.selectedUser}" selectionMode="single"
					rowKey="#{user.userid }" emptyMessage="Keine User gefunden">

					<p:column id="name" headerText="Name" style="width:20%">
						<h:outputText value="#{user.username}" />
					</p:column>
					<p:column id="userid" headerText="Beutzer ID" style="width:10%">
						<h:outputText value="#{user.userid}" />
					</p:column>
					<p:column id="email" headerText="Emailadresse" style="width:15%">
						<h:outputText value="#{user.email}" />
					</p:column>
					<p:column id="state" headerText="Registrierungsstatus" style="width:160px">
						<h:outputText value="#{user.state}" />
					</p:column>
					<p:column id="group" headerText="Gruppen" style="width:140px">
						<h:outputText value="#{user.group.description}" />
					</p:column>
				</p:dataTable>
			</p:panel>
		</h:form>

		<h:form id="dlg">
			<p:dialog header="User bearbeiten" widgetVar="userDialog"
				modal="true" showEffect="fade" hideEffect="fade" resizable="false">
				<p:outputPanel id="userPan" style="text-align:center;">
					<p:panelGrid columns="2" columnClasses="label,value">

						<p:outputLabel for="name" value="Name:" />
						<p:inputText id="name"
							value="#{editUserBean.selectedUser.username}" placeholder="Name" />

						<p:outputLabel value="#{msg['register.userid']}" for="userid" />
						<p:inputText value="#{editUserBean.selectedUser.userid}"
							placeholder="UserID" id="userid" required="true"
							requiredMessage="#{msg['valuerequired']}" />

						<p:outputLabel value="#{msg['register.email']}" for="email" />
						<p:inputText value="#{editUserBean.selectedUser.email}"
							placeholder="Email" id="email"
							validatorMessage="Keine gültige Emailadresse" required="true"
							requiredMessage="#{msg['valuerequired']}">
							<f:validateRegex
								pattern="^[_A-Za-z0-9-\+]+(\.[_A-Za-z0-9-]+)*@[A-Za-z0-9-]+(\.[A-Za-z0-9]+)*(\.[A-Za-z]{2,})$" />
						</p:inputText>
						<p:outputLabel for="group" value="Gruppe:" />

						<p:selectOneListbox id="group" value="#{editUserBean.selectedUser.group}" converter="#{groupConverter}" var="g">
							<f:selectItems value="#{editUserBean.groups}" var="group" itemLabel="#{group.description}" itemValue="#{group}" />
<!-- 
							<p:column>
								<h:outputText styleClass="ui-theme ui-theme-#{t.name}" />
							</p:column>
 -->
							<p:column>
								<h:outputText value="#{g.description}" />
							</p:column>
						</p:selectOneListbox>
					</p:panelGrid>
					<p:commandButton value="Speichern"
						actionListener="#{editUserBean.saveUser}"
						update=":edituserform:pnl,:edituserform:growl"
						onclick="ruleDialog.hide()" />
					<p:commandButton value="Abbrechen" onclick="ruleDialog.hide()" />
				</p:outputPanel>
			</p:dialog>
		</h:form>

	</ui:define>
</ui:composition>
