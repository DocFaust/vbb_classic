<ui:composition 
	template="../template.xhtml" 
	xmlns="http://www.w3.org/1999/xhtml" 
	xmlns:f="http://java.sun.com/jsf/core" 
	xmlns:p="http://primefaces.org/ui"
	xmlns:ui="http://xmlns.jcp.org/jsf/facelets" 
	xmlns:h="http://java.sun.com/jsf/html">
	<f:loadBundle basename="de.docfaust.vbb.messages_de_DE" var="msg" />
	<ui:define name="content">
		<h:form id="buchungsschnitt">

			<p:panel id="pnl" header="Buchungsschnitt">
				<p:growl id="growl" showDetail="true" />
				Hiermit wird ein Buchungsschnitt durchgeführt. Es werden alle alten Buchungen, Saisons und Spiele gelöscht und lediglich der Saldo behalten.<br/>
				
				<p:outputLabel for="datum" value="Datum des Buchungsschnitts:" />
				<p:calendar id="datum" value="#{reorgDatabaseBean.selectedDatum}" required="true" requiredMessage="Datum erforderlich" locale="de" placeholder="Datum" />
				<p:message for="datum" />
				<p:commandButton value="Buchungsschnitt durchführen" action="#{reorgDatabaseBean.starteBuchungsschnitt}" update="growl"/>

			</p:panel>
		</h:form>
		
	</ui:define>
</ui:composition>
