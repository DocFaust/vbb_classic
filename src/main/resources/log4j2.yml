Configuration:
  status: warn
  thresholdFilter:
    level: debug
  appenders:
    Console:
      name: STDOUT
      PatternLayout:
        Pattern: "%d{yyyy-MM-dd HH:mm:ss} %-5p [%t] %c{1} - %m%n"
    File:
      name: File
      fileName: log/docfaust.log
      PatternLayout:
        Pattern: "%d %p %C{1.} [%t] %m%n"
      Filters:
        ThresholdFilter:
          level: error
 
  Loggers:
    logger:
      -
        name: de.docfaust
        level: info
        additivity: false
        AppenderRef:
          ref: STDOUT
    Root:
      level: warn
      AppenderRef:
        ref: File
          