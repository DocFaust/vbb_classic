<html xmlns="http://www.w3.org/1999/xhtml" xmlns:f="http://java.sun.com/jsf/core" xmlns:h="http://xmlns.jcp.org/jsf/html" xmlns:p="http://primefaces.org/ui"
	xmlns:ui="http://xmlns.jcp.org/jsf/facelets">
<h:head>
	<title>Volleyballbuchung</title>
	<link rel="shortcut icon" type="image/x-icon" href="#{resource['images/favicon.ico']}" />
	<h:outputStylesheet library="css" name="vbb.css" />
	<h:outputScript library="js" name="locale.js" />
	<f:loadBundle basename="de.docfaust.vbb.messages_de_DE" var="msg" />
</h:head>
<h:body>
	<div id="wrapper">
		<div id="header">
			<h1 style="title">Volleyballbuchung</h1>
		</div>
		<!-- Content falls eingeloggt -->
		<div id="menu">
			<ui:include src="menu.xhtml" />
		</div>
		<div id="content">
			<ui:insert name="content" />
		</div>
		<div id="footer">
			<hr />
			<h:outputText value="Copyright &#x00a9; DocFaust 2019" />
		</div>
	</div>
	<p:ajaxStatus onstart="PF('statusDialog').show()" onsuccess="PF('statusDialog').hide()" />

	<p:dialog widgetVar="statusDialog" modal="true" draggable="false" closable="false" resizable="false" showHeader="false">
		<p:graphicImage name="images/ajax-loader.gif" />
	</p:dialog>

</h:body>

</html>
