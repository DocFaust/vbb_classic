<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:h="http://java.sun.com/jsf/html" xmlns:f="http://java.sun.com/jsf/core" xmlns:p="http://primefaces.org/ui"
	xmlns:pm="http://primefaces.org/mobile">

<f:view renderKitId="PRIMEFACES_MOBILE" />

<h:head>
	<title>Volleyballbuchung Mobile</title>
</h:head>

<h:body>
	<pm:page id="spieleingeben">
		<pm:header title="Volleyballbuchung" swatch="b">
			<p:button value="zurück" outcome="summary?transition=flip" icon="ui-icon-arrow-l" styleClass="ui-btn-left ui-btn-inline" />
		</pm:header>
		<pm:content>
			<p:outputPanel id="panel" rendered="#{mobileLoginBean.loginSuccessful}">

				<h:form id="pnl">
					<p:growl id="growl" showDetail="true" />
					<h:panelGrid columns="3">
						<p:outputLabel for="datum" value="Datum" />
						<p:calendar id="datum" value="#{spielBean.datum }" required="true" requiredMessage="Datum erforderlich" locale="de" placeholder="Datum" />
						<p:message for="datum" />
					</h:panelGrid>
					<p:separator />
					<p:dataList id="spieler" value="#{spielBean.spielerList }" var="s">
						<p:panelGrid columns="3">
							<h:outputText value="#{s.name}" />
							<h:selectBooleanCheckbox value="#{s.anwesend}" />
							<h:selectBooleanCheckbox value="#{s.bezahlt}" />
						</p:panelGrid>
					</p:dataList>
					<p:commandButton value="Speichern" action="#{spielBean.saveSpiel}" update="growl" />
				</h:form>
			</p:outputPanel>
			<p:outputPanel rendered="#{!mobileLoginBean.loginSuccessful}">
				<h1>Bitte anmelden</h1>

			</p:outputPanel>

		</pm:content>
		<pm:footer>
			<h:outputText value="Copyright &#x00a9; DocFaust 2014" />
		</pm:footer>
	</pm:page>
</h:body>

</html>
