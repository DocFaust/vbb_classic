<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
	xmlns:p="http://primefaces.org/ui"
	xmlns:f="http://java.sun.com/jsf/core">
	<ui:composition>
		<ui:insert name="menu">
			<h:form id="menuForm">
				<p:growl id="growl" showDetail="true" />
				<p:menubar>
					<p:menuitem icon="ui-icon-home" action="/reader/summary" />
					<p:submenu label="Spiel" rendered="#{request.isUserInRole('USER') or request.isUserInRole('ADMIN')}">
						<p:menuitem value="Neues Spiel" icon="ui-icon-plus"
							outcome="/users/spieleingeben.xhtml" />
						<p:menuitem value="Spiel bearbeiten" icon="ui-icon-pencil"
							outcome="/users/searchspiel" />
						<p:menuitem value="Individuelle Buchung" icon="ui-icon-pencil"
							outcome="/users/createIndividualBooking" />
					</p:submenu>
					<p:submenu label="Spieler" rendered="#{request.isUserInRole('USER') or request.isUserInRole('ADMIN')}">
						<p:menuitem value="Spieler bearbeiten" icon="ui-icon-pencil"
							outcome="/users/editspieler" />
					</p:submenu>
					<p:submenu label="Saison" rendered="#{request.isUserInRole('USER') or request.isUserInRole('ADMIN')}">
						<p:menuitem value="Saison bearbeiten" icon="ui-icon-pencil"
							outcome="/users/editsaison" />
					</p:submenu>
					<p:submenu label="Profil">
						<p:menuitem value="Profil bearbeiten" icon="ui-icon-pencil"
							outcome="/reader/editProfile" />
					</p:submenu>
					<p:submenu label="Admin"
						rendered="#{request.isUserInRole('ADMIN')}">
						<p:menuitem value="User bearbeiten" icon="ui-icon-pencil"
							outcome="/admin/edituser" />
						<p:menuitem value="Buchungsschnitt" icon="ui-icon-pencil"
							outcome="/admin/buchungsschnitt" />
						<p:menuitem value="Emailkonfiguration" icon="ui-icon-pencil"
							outcome="/admin/editConfig" />
					</p:submenu>
					<f:facet name="options">
					#{request.remoteUser}
						<p:commandButton value="Abmelden" icon="ui-icon-pencil"
							action="#{loginBean.logout}" outcome="/index"/>
					</f:facet>
				</p:menubar>
			</h:form>
		</ui:insert>
	</ui:composition>
</ui:composition>
