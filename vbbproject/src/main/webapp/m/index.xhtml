<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" 
	xmlns:h="http://java.sun.com/jsf/html" 
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:p="http://primefaces.org/ui" 
	xmlns:pm="http://primefaces.org/mobile">

<f:view renderKitId="PRIMEFACES_MOBILE" />

<h:head>
	<title>Volleyballbuchung Mobile</title>
</h:head>

<h:body>
	<pm:page id="summary" lazy="false">
		<pm:header title="Volleyballbuchung" swatch="b">
			<p:button value="Neues Spiel" outcome="pm:spieleingeben?transition=flip" icon="ui-icon-arrow-r" styleClass="ui-btn-right ui-btn-inline" />
		</pm:header>

		<pm:content>
			<p:outputPanel id="panel">
				<p:dataList id="saldo" value="#{spielBean.saldo}" var="s">
					<f:facet name="header">
						<h:panelGrid border="0" columns="2">
							<p:outputLabel value="Komplettsaldo" />
							<p:outputLabel value="#{spielBean.completeSaldo}">
								<f:convertNumber currencyCode="EUR" type="currency" locale="de_DE" />
							</p:outputLabel>
						</h:panelGrid>
					</f:facet>

					<h:outputText value="#{s.key }" />
					<p class="ui-li-aside">
						<h:outputText value="#{s.value }">
							<f:convertNumber currencyCode="EUR" type="currency" locale="de_DE" />
						</h:outputText>
					</p>
				</p:dataList>
			</p:outputPanel>
		</pm:content>

		<pm:footer>
			<h:outputText value="Copyright &#x00a9; DocFaust 2015" />
		</pm:footer>
	</pm:page>

	<pm:page id="spieleingeben" lazy="true">
		<pm:header title="Volleyballbuchung" swatch="b">
			<p:button value="zurück" outcome="pm:summary?transition=flip" icon="ui-icon-arrow-l" styleClass="ui-btn-left ui-btn-inline" />
		</pm:header>
		<pm:content>
			<h:form id="pnl">
				<p:growl id="growl" showDetail="true" />
				<h:panelGrid columns="3">
					<p:outputLabel for="datum" value="Datum" />
					<p:calendar id="datum" value="#{spielBean.datum }" required="true" requiredMessage="Datum erforderlich" locale="de" placeholder="Datum" />
					<p:message for="datum" />
				</h:panelGrid>
				<p:separator />
				<p:dataList id="spieler" value="#{spielBean.spielerList }" var="s">
					<p:panelGrid columns="3">
						<h:outputText value="#{s.name }" />
						<h:selectBooleanCheckbox value="#{s.anwesend }" />
						<h:selectBooleanCheckbox value="#{s.bezahlt }" />
					</p:panelGrid>
				</p:dataList>
				<p:separator />
				<p:commandButton value="Speichern" action="#{spielBean.saveSpiel}" update="growl,pnl" />
			</h:form>
		</pm:content>
		<pm:footer>
			<h:outputText value="Copyright &#x00a9; DocFaust 2014" />
		</pm:footer>
	</pm:page>
</h:body>

</html>
