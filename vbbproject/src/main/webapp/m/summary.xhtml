<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:h="http://java.sun.com/jsf/html" xmlns:f="http://java.sun.com/jsf/core" xmlns:p="http://primefaces.org/ui"
	xmlns:pm="http://primefaces.org/mobile">

<f:view renderKitId="PRIMEFACES_MOBILE" />

<h:head>
	<title>Volleyballbuchung Mobile</title>
</h:head>

<h:body>
	<pm:page id="summary">
		<pm:header title="Volleyballbuchung" swatch="b">
			<p:button value="Neues Spiel" outcome="spieleingeben?transition=flip" icon="ui-icon-arrow-r" styleClass="ui-btn-right ui-btn-inline" />
			<p:button value="zurück" outcome="index2?transition=flip" icon="ui-icon-arrow-l" styleClass="ui-btn-left ui-btn-inline" />
		</pm:header>

		<pm:content>
			<p:dataList id="saldo" value="#{spielBean.saldo}" var="s">
				<f:facet name="header">
					<h:panelGrid border="0" columns="2">
								<p:outputLabel value="Komplettsaldo" />
						<p:outputLabel value="#{spielBean.completeSaldo}">
							<f:convertNumber currencyCode="EUR" type="currency" locale="de_DE" />
						</p:outputLabel>
					</h:panelGrid>
				</f:facet>
				<pm:field>
					<h:outputText value="#{s.key }" />
					<p class="ui-li-aside">
						<h:outputText value="#{s.value }">
							<f:convertNumber currencyCode="EUR" type="currency" locale="de_DE" />
						</h:outputText>
					</p>
				</pm:field>
			</p:dataList>
		</pm:content>

		<pm:footer>
			<h:outputText value="Copyright &#x00a9; DocFaust 2015" />
		</pm:footer>
	</pm:page>

</h:body>

</html>
