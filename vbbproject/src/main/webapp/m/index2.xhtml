<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:h="http://java.sun.com/jsf/html" xmlns:f="http://java.sun.com/jsf/core" xmlns:p="http://primefaces.org/ui"
	xmlns:pm="http://primefaces.org/mobile">

<f:view renderKitId="PRIMEFACES_MOBILE" />

<h:head>
	<title>Volleyballbuchung Mobile</title>
</h:head>

<h:body>
	<pm:page id="login">
		<pm:header title="Volleyballbuchung" swatch="b">
			<p:button id="btn" value="Zusammenfassung" outcome="summary?transition=flip" icon="ui-icon-arrow-r" styleClass="ui-btn-right ui-btn-inline" />
		</pm:header>
		<pm:content>
			<h:form id="loginform">
				<p:growl id="growl" showDetail="true" />
				<pm:field>
					<p:outputLabel value="UserID" for="userid" />
					<p:inputText id="userid" value="#{mobileLoginBean.userid}" />
				</pm:field>
				<pm:field>
					<p:outputLabel value="Passwort" for="password" />
					<p:password id="password" value="#{mobileLoginBean.password}" />
				</pm:field>
				<p:commandButton value="Login" action="#{mobileLoginBean.loginWithOutcome}" icon="ui-icon-check" update="growl" />
				<p:commandButton value="Logout" action="#{mobileLoginBean.logout}" icon="ui-icon-check" update="growl" />
			</h:form>
		</pm:content>
		<pm:footer>
			<h:outputText value="Copyright &#x00a9; DocFaust 2014" />
		</pm:footer>
	</pm:page>
</h:body>

</html>
