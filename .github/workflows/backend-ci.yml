name: Backend CI

on:
  push:
    branches: ["master"]
    paths:
      - "backend/**"
      - "frontend/**"
      - "db/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches: ["master"]
    paths:
      - "backend/**"
      - "frontend/**"
      - "db/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  backend-lint-checkstyle:
    name: backend-lint-checkstyle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: "temurin"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Run Checkstyle
        run: gradle -p backend checkstyleMain checkstyleTest --stacktrace

  backend-test-coverage:
    name: backend-test-coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: "temurin"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Run tests with coverage
        run: gradle -p backend test jacocoTestReport --stacktrace
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: backend-jacoco-report
          path: backend/build/reports/jacoco/test/jacocoTestReport.xml

  backend-dependency-check:
    name: backend-dependency-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: "temurin"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Run OWASP Dependency Check
        run: gradle -p backend dependencyCheckAnalyze --stacktrace
      - name: Upload dependency check report
        uses: actions/upload-artifact@v4
        with:
          name: backend-dependency-check-report
          path: backend/build/reports/dependency-check-report.*

  backend-sonar:
    name: backend-sonar
    runs-on: ubuntu-latest
    needs: [backend-lint-checkstyle, backend-test-coverage, backend-dependency-check]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: "temurin"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install
      - name: Run frontend tests with coverage
        working-directory: frontend
        run: npm run test
      - name: SonarCloud analyze backend
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: gradle -p backend sonar --info --stacktrace
